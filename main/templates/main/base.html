{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  <link rel="stylesheet" href="{% static 'css/base.css' %}" />
  {% block extra_css %}{% endblock %}
  <title>{% block title %}Khikam{% endblock %}</title>
</head>
<body>
  <nav>
    <div class="nav-container">
      <div class="logo"><a href="{% url 'home' %}"><span>My Website</span></a></div>
      <div class="links">
        <div class="link {% if request.resolver_match.url_name == 'home' %}active-page{% endif %}">
          <a href="{% url 'home' %}">Home</a>
        </div>
        <div class="link {% if request.resolver_match.url_name == 'about' %}active-page{% endif %}">
          <a href="{% url 'about' %}">About</a>
        </div>
        <div class="link {% if request.resolver_match.url_name == 'skills' %}active-page{% endif %}">
          <a href="{% url 'skills' %}">Skills</a>
        </div>
        <div class="link {% if request.resolver_match.url_name == 'services' %}active-page{% endif %}">
          <a href="{% url 'services' %}">Services</a>
        </div>
        <div class="link {% if request.resolver_match.url_name == 'blogs' %}active-page{% endif %}">
          <a href="{% url 'blogs' %}">Blogs</a>
        </div>
        <div class="link contact-btn {% if request.resolver_match.url_name == 'contact' %}active-page{% endif %}">
          <a href="{% url 'contact' %}">Contact Us</a>
        </div>
      </div>
      <i class="fa-solid fa-bars hamburg" onclick="hamburg()"></i>
    </div>
    <div class="dropdown">
      <div class="links">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'about' %}">About</a>
        <a href="{% url 'skills' %}">Skills</a>
        <a href="{% url 'services' %}">Services</a>
        <a href="{% url 'blogs' %}">Blogs</a>
        <a href="{% url 'contact' %}">Contact Us</a>
        <i class="fa-solid fa-xmark cancel" onclick="cancel()"></i>
      </div>
    </div>
  </nav>

  <main class="page-main">
    {% block content %}{% endblock %}
  </main>

  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>
    AOS.init({ offset: 0, once: true });
    function hamburg() { document.querySelector('.dropdown').style.transform = 'translateY(0px)'; }
    function cancel() { document.querySelector('.dropdown').style.transform = 'translateY(-500px)'; }
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
